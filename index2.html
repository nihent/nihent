<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Official Link</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* Base Variables */
        :root {
            --bg-color: #03050a; --text-main: #ffffff; --text-muted: #94a3b8; --accent: #3b82f6;
            --btn-bg: rgba(255, 255, 255, 0.08); --btn-border: rgba(255, 255, 255, 0.15); 
            --btn-hover: rgba(255, 255, 255, 0.15); --btn-text: #ffffff;
            --font-family: 'Outfit', sans-serif;
        }

        /* 🎨 THEMES (Inko JS automatically apply karega) */
        [data-template="dark_galaxy"] { --bg-color: #0b0f19; background-image: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%), radial-gradient(circle at 85% 30%, rgba(147, 51, 234, 0.15), transparent 25%); }
        [data-template="sunset_vibes"] { --bg-color: #ff7e5f; background: linear-gradient(to right, #ff7e5f, #feb47b); --btn-bg: rgba(0,0,0,0.2); --btn-border: rgba(0,0,0,0.1); }
        [data-template="deep_ocean"] { --bg-color: #020024; background: linear-gradient(135deg, #020024 0%, #090979 35%, #00d4ff 100%); }
        [data-template="minimal_slate"] { --bg-color: #18181b; background: #18181b; --btn-bg: rgba(255,255,255,0.05); --btn-border: rgba(255,255,255,0.1); }
        [data-template="pure_black"] { --bg-color: #000000; background: #000000; }
        [data-template="pure_white"] { --bg-color: #ffffff; background: #ffffff; --text-main: #000000; --text-muted: #555555; --btn-text: #000; --btn-bg: #f3f4f6; --btn-border: #d1d5db; --btn-hover: #e5e7eb; }

        /* Button Styles */
        [data-button="solid"] { --btn-bg: var(--text-main); --btn-text: var(--bg-color); --btn-border: transparent; --btn-hover: var(--text-muted); }
        [data-button="outline"] { --btn-bg: transparent; --btn-border: var(--text-main); --btn-hover: var(--text-main); }

        /* Global Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-family); -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-color); color: var(--text-main); 
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; 
            position: relative; overflow-x: hidden; padding-bottom: 40px; 
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        /* Overlay for custom images */
        #bg-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); z-index: -1; display: none; }

        .container { width: 100%; max-width: 550px; padding: 60px 24px 20px; z-index: 1; }
        .animate-up { opacity: 0; transform: translateY(20px); animation: slideUp 0.6s forwards; }

        .profile-header { text-align: center; margin-bottom: 40px; }
        .profile-img-container { position: relative; width: 110px; height: 110px; margin: 0 auto 15px; padding: 3px; background: var(--accent); border-radius: 50%; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .profile-img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; border: 3px solid var(--bg-color); }
        .verified-badge { position: absolute; bottom: 0; right: 0; background: var(--accent); color: #fff; border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-size: 12px; border: 2px solid var(--bg-color); display: none; }
        
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.5px; }
        .bio { color: var(--text-muted); font-size: 15px; line-height: 1.5; white-space: pre-wrap; opacity: 0.9; }

        .links-container { display: flex; flex-direction: column; gap: 14px; margin-bottom: 40px;}
        .link-card { background: var(--btn-bg); border: 1px solid var(--btn-border); backdrop-filter: blur(10px); padding: 16px; border-radius: 16px; text-decoration: none; color: var(--btn-text); display: flex; align-items: center; transition: 0.3s; }
        .link-card:hover { transform: translateY(-3px); background: var(--btn-hover); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        [data-button="outline"] .link-card:hover { color: var(--bg-color); }
        [data-button="outline"] .link-card:hover .link-icon { color: var(--bg-color); }

        .link-icon { font-size: 20px; width: 40px; display: flex; justify-content: flex-start; color: inherit; opacity: 0.8; }
        .link-text { flex-grow: 1; text-align: center; font-weight: 500; font-size: 16px; padding-right: 40px; }

        .social-dock { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; }
        .social-icon { width: 45px; height: 45px; border-radius: 50%; background: var(--btn-bg); border: 1px solid var(--btn-border); display: flex; justify-content: center; align-items: center; color: var(--text-main); font-size: 20px; text-decoration: none; transition: 0.3s; backdrop-filter: blur(10px); }
        .social-icon:hover { transform: translateY(-5px); background: var(--text-main); color: var(--bg-color); }

        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="bg-overlay"></div>

    <div class="container">
        <header class="profile-header animate-up">
            <div class="profile-img-container">
                <img src="" alt="Profile" class="profile-img" id="dom-dp">
                <div class="verified-badge" id="dom-verified"><i class="fa-solid fa-check"></i></div>
            </div>
            <h1 id="dom-name"></h1>
            <p class="bio" id="dom-bio"></p>
        </header>

        <div class="links-container animate-up" id="dom-links" style="animation-delay: 0.1s;">
            </div>

        <div class="social-dock animate-up" id="dom-socials" style="animation-delay: 0.2s;">
            </div>
    </div>

    <script>
        const myProfile = {
            // 1. Profile Details
            displayName: "Nihent",
            bio: "I love peace and mist",
            profilePicUrl: "https://avatars.githubusercontent.com/u/230732626?s=96&v=4",
            showVerifiedBadge: true, // true (dikhayega) ya false (hata dega)

            // 2. Appearance & Design
            theme: "dark_galaxy", // Options: dark_galaxy, sunset_vibes, deep_ocean, minimal_slate, pure_black, pure_white, custom
            customBackgroundImage: "https://i.ibb.co/bR5tnmPN/3b52995903db.jpg")
            
            buttonStyle: "glass", // Options: glass, solid, outline
            fontFamily: "Outfit", // Options: Inter, Outfit, Playfair Display

            // 3. Social Dock (Neeche wale chote icons)
            socialLinks: {
                instagram: ""
                twitterX: "https://x.com/nihent015",
                email: "mailto:nihent9@gmail.com" // Agar blank rakhna hai toh aise likho: ""
            },

            // 4. Main Links (Bade Buttons)
            links: [
                { title: "My YouTube Channel", url: "https://youtube.com" },
                { title: "Follow me on X", url: "https://x.com" },
                { title: "Personal Portfolio", url: "https://github.com" },
                { title: "Join Telegram", url: "https://t.me" }
            ]
        };

        /* ====================================================================
           🚀 SYSTEM CODE (Isko chhedne ki zaroorat nahi hai) 🚀
           ==================================================================== */
        
        // Smart Icon Detector
        function getIcon(title) {
            const t = title.toLowerCase();
            if (t.includes('instagram') || t.includes('ig')) return 'fa-brands fa-instagram';
            if (t.includes('youtube') || t.includes('yt')) return 'fa-brands fa-youtube';
            if (t.includes('twitter') || t === 'x' || t.includes('x.com')) return 'fa-brands fa-x-twitter';
            if (t.includes('facebook') || t.includes('fb')) return 'fa-brands fa-facebook';
            if (t.includes('tiktok')) return 'fa-brands fa-tiktok';
            if (t.includes('snapchat') || t.includes('snap')) return 'fa-brands fa-snapchat';
            if (t.includes('linkedin')) return 'fa-brands fa-linkedin';
            if (t.includes('whatsapp') || t.includes('wa')) return 'fa-brands fa-whatsapp';
            if (t.includes('telegram') || t.includes('tg')) return 'fa-brands fa-telegram';
            if (t.includes('discord')) return 'fa-brands fa-discord';
            if (t.includes('spotify')) return 'fa-brands fa-spotify';
            if (t.includes('github')) return 'fa-brands fa-github';
            if (t.includes('portfolio') || t.includes('website')) return 'fa-solid fa-globe';
            return 'fa-solid fa-link';
        }

        // Apply Design
        document.documentElement.setAttribute('data-template', myProfile.theme);
        document.documentElement.setAttribute('data-button', myProfile.buttonStyle);
        document.documentElement.style.setProperty('--font-family', `'${myProfile.fontFamily}', sans-serif`);

        if (myProfile.theme === 'custom' && myProfile.customBackgroundImage !== '') {
            document.body.style.backgroundImage = `url('${myProfile.customBackgroundImage}')`;
            document.getElementById('bg-overlay').style.display = 'block';
        }

        // Apply Profile Data
        document.title = `${myProfile.displayName} | Official Link`;
        document.getElementById('dom-dp').src = myProfile.profilePicUrl;
        document.getElementById('dom-name').innerText = myProfile.displayName;
        document.getElementById('dom-bio').innerText = myProfile.bio;
        
        if (myProfile.showVerifiedBadge) {
            document.getElementById('dom-verified').style.display = 'flex';
        }

        // Render Main Links
        const linksContainer = document.getElementById('dom-links');
        myProfile.links.forEach(link => {
            linksContainer.innerHTML += `
                <a href="${link.url}" class="link-card" target="_blank">
                    <div class="link-icon"><i class="${getIcon(link.title)}"></i></div>
                    <div class="link-text">${link.title}</div>
                </a>
            `;
        });

        // Render Social Dock
        const socialsContainer = document.getElementById('dom-socials');
        if (myProfile.socialLinks.instagram) {
            socialsContainer.innerHTML += `<a href="${myProfile.socialLinks.instagram}" class="social-icon" target="_blank"><i class="fa-brands fa-instagram"></i></a>`;
        }
        if (myProfile.socialLinks.twitterX) {
            socialsContainer.innerHTML += `<a href="${myProfile.socialLinks.twitterX}" class="social-icon" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>`;
        }
        if (myProfile.socialLinks.email) {
            socialsContainer.innerHTML += `<a href="mailto:${myProfile.socialLinks.email}" class="social-icon"><i class="fa-solid fa-envelope"></i></a>`;
        }
    </script>
</body>
</html>
