        /* Screenshot jaisa exact dark overlay taaki text padhne mein aaye */
        body::before { 
            content: ''; 
            position: absolute; 
            inset: 0; 
            background: rgba(0,0,0,0.6); 
            z-index: -1; 
        }

        .container { 
            width: 100%; 
            max-width: 550px; 
            padding: 60px 24px 20px; 
            z-index: 1; 
        }
        
        .animate-up { 
            opacity: 0; 
            transform: translateY(20px); 
            animation: slideUp 0.6s forwards; 
        }

        /* Profile Section (Exact Matching) */
        .profile-header { text-align: center; margin-bottom: 40px; }
        
        .profile-img-container { 
            position: relative; 
            width: 110px; 
            height: 110px; 
            margin: 0 auto 15px; 
            padding: 3px; 
            background: var(--accent); /* Blue Ring */
            border-radius: 50%; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); 
        }
        
        .profile-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            border-radius: 50%; 
            border: 3px solid #111; /* Dark gap to match screenshot exactly */
        }
        
        .verified-badge { 
            position: absolute; 
            bottom: 0; 
            right: 0; 
            background: var(--accent); 
            color: #fff; 
            border-radius: 50%; 
            width: 26px; 
            height: 26px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 12px; 
            border: 2px solid #111; 
        }
        
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.5px; }
        .bio { color: #94a3b8; font-size: 15px; line-height: 1.5; white-space: pre-wrap; opacity: 0.9; }

        /* Links Section (Exact Margin and Padding) */
        .links-container { display: flex; flex-direction: column; gap: 14px; margin-bottom: 40px;}
        
        .link-card { 
            background: var(--btn-bg); 
            border: 1px solid var(--btn-border); 
            backdrop-filter: blur(10px); 
            padding: 16px; 
            border-radius: 16px; 
            text-decoration: none; 
            color: var(--text-main); 
            display: flex; 
            align-items: center; 
            transition: 0.3s; 
        }
        .link-card:hover { 
            transform: translateY(-3px); 
            background: var(--btn-hover); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
        }

        .link-icon { font-size: 20px; width: 40px; display: flex; justify-content: flex-start; color: inherit; opacity: 0.8; }
        .link-text { flex-grow: 1; text-align: center; font-weight: 500; font-size: 16px; padding-right: 40px; }

        /* Social Dock (Exact Round shape and gap) */
        .social-dock { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; }
        
        .social-icon { 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            background: var(--btn-bg); 
            border: 1px solid var(--btn-border); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: var(--text-main); 
            font-size: 20px; 
            text-decoration: none; 
            transition: 0.3s; 
            backdrop-filter: blur(10px); 
        }
        .social-icon:hover { 
            transform: translateY(-5px); 
            background: #fff; 
            color: #000; 
        }

        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
    </style>
