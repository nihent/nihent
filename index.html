<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nihent | Official Profile</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/jpeg" href="https://i.ibb.co/V09Cywvf/20d68c7eecc4dd007a7741cdc4eee97d.jpg">
    
    <style>
        :root {
            --accent: #3b82f6; /* Wahi perfect blue color */
            --btn-bg: rgba(255, 255, 255, 0.08); 
            --btn-border: rgba(255, 255, 255, 0.15); 
            --btn-hover: rgba(255, 255, 255, 0.15); 
            --text-main: #ffffff;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Outfit', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { 
            background-color: #03050a; 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            position: relative; 
            overflow-x: hidden; 
            padding-bottom: 40px; 
            
            /* Tumhari Background Image Yahan Hai */
            background-image: url('https://i.ibb.co/0VG7Rpcc/70bbb887ce58.jpg');
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
        }

        /* Screenshot jaisa exact dark overlay taaki text padhne mein aaye */
        body::before { 
            content: ''; 
            position: absolute; 
            inset: 0; 
            background: rgba(0,0,0,0.6); 
            z-index: -1; 
        }

        .container { 
            width: 100%; 
            max-width: 550px; 
            padding: 60px 24px 20px; 
            z-index: 1; 
        }
        
        .animate-up { 
            opacity: 0; 
            transform: translateY(20px); 
            animation: slideUp 0.6s forwards; 
        }

        /* Profile Section (Exact Matching) */
        .profile-header { text-align: center; margin-bottom: 40px; }
        
        .profile-img-container { 
            position: relative; 
            width: 110px; 
            height: 110px; 
            margin: 0 auto 15px; 
            padding: 3px; 
            background: var(--accent); /* Blue Ring */
            border-radius: 50%; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); 
        }
        
        .profile-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            border-radius: 50%; 
            border: 3px solid #111; /* Dark gap to match screenshot exactly */
        }
        
        .verified-badge { 
            position: absolute; 
            bottom: 0; 
            right: 0; 
            background: var(--accent); 
            color: #fff; 
            border-radius: 50%; 
            width: 26px; 
            height: 26px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 12px; 
            border: 2px solid #111; 
        }
        
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.5px; }
        .bio { color: #94a3b8; font-size: 15px; line-height: 1.5; white-space: pre-wrap; opacity: 0.9; }

        /* Links Section (Exact Margin and Padding) */
        .links-container { display: flex; flex-direction: column; gap: 14px; margin-bottom: 40px;}
        
        .link-card { 
            background: var(--btn-bg); 
            border: 1px solid var(--btn-border); 
            backdrop-filter: blur(10px); 
            padding: 16px; 
            border-radius: 16px; 
            text-decoration: none; 
            color: var(--text-main); 
            display: flex; 
            align-items: center; 
            transition: 0.3s; 
        }
        .link-card:hover { 
            transform: translateY(-3px); 
            background: var(--btn-hover); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
        }

        .link-icon { font-size: 20px; width: 40px; display: flex; justify-content: flex-start; color: inherit; opacity: 0.8; }
        .link-text { flex-grow: 1; text-align: center; font-weight: 500; font-size: 16px; padding-right: 40px; }

        /* Social Dock (Exact Round shape and gap) */
        .social-dock { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; }
        
        .social-icon { 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            background: var(--btn-bg); 
            border: 1px solid var(--btn-border); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: var(--text-main); 
            font-size: 20px; 
            text-decoration: none; 
            transition: 0.3s; 
            backdrop-filter: blur(10px); 
        }
        .social-icon:hover { 
            transform: translateY(-5px); 
            background: #fff; 
            color: #000; 
        }

        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <header class="profile-header animate-up">
            <div class="profile-img-container">
                <img src="https://i.ibb.co/V09Cywvf/20d68c7eecc4dd007a7741cdc4eee97d.jpg" alt="Nihent" class="profile-img">
                <div class="verified-badge"><i class="fa-solid fa-check"></i></div>
            </div>
            <h1>Nihent</h1>
            <p class="bio">I love Peace and Mist</p>
        </header>

        <div class="links-container animate-up" style="animation-delay: 0.1s;">
            <a href="https://instagram.com/nihent_" class="link-card" target="_blank">
                <div class="link-icon"><i class="fa-brands fa-instagram"></i></div>
                <div class="link-text">Instagram</div>
            </a>
            
            <a href="https://github.com/nihent" class="link-card" target="_blank">
                <div class="link-icon"><i class="fa-brands fa-github"></i></div>
                <div class="link-text">GitHub</div>
            </a>
            
            <a href="https://discord.com/nihent_" class="link-card" target="_blank">
                <div class="link-icon"><i class="fa-brands fa-discord"></i></div>
                <div class="link-text">Discord</div>
            </a>

            <a href="https://t.me/Nihent" class="link-card" target="_blank">
                <div class="link-icon"><i class="fa-brands fa-telegram"></i></div>
                <div class="link-text">Telegram</div>
            </a>
        </div>

        <div class="social-dock animate-up" style="animation-delay: 0.2s;">
            <a href="https://x.com/nihent_" class="social-icon" target="_blank">
                <i class="fa-brands fa-x-twitter"></i>
            </a>
            
            <a href="mailto:nihent9@gmail.com" class="social-icon">
                <i class="fa-solid fa-envelope"></i>
            </a>
        </div>
    </div>

</body>
</html>
